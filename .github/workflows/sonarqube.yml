name: SonarQube Analysis

on:
  push:
    branches: [master, dev, production]

  pull_request:
    branches: [production, dev, test]
    types: [opened, synchronize, reopened]

jobs:
  sonarqube:
    name: SonarQube Scan
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3
        with:
          fetch-depth: 0

      # Create backend test structure
      - name: Setup backend test structure
        run: |
          mkdir -p ./tests
          touch ./tests/__init__.py
          mv ./test_app.py ./tests/

      # Setup Python
      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install backend dependencies
        working-directory: ./
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run backend tests with coverage
        working-directory: ./
        run: |
          pytest tests/ --cov=. --cov-report=xml --cov-report=term-missing

      # Create Sonar properties
      - name: Create sonar-project.properties
        run: |
          cat > sonar-project.properties << 'EOL'
          sonar.organization=${{ secrets.SONAR_ORGANIZATION }}
          sonar.projectKey=${{ secrets.SONAR_PROJECT_KEY }}
          sonar.projectName=LMS System

          sonar.sources=./
          sonar.tests=./tests

          sonar.exclusions=**/node_modules/**,**/*.test.js,**/*.test.tsx,**/tests/**,**/coverage/**
          sonar.test.inclusions=**/*.test.js,**/*.test.tsx,**/test_*.py

          sonar.python.coverage.reportPaths=./coverage.xml

          sonar.sourceEncoding=UTF-8
          sonar.python.version=3.10
          EOL

      # SonarCloud scan
      - name: SonarCloud Scan
        uses: SonarSource/sonarcloud-github-action@master
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
